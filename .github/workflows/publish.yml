"on":
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      framework:
        required: true
        type: string
      os:
        required: true
        type: string
      target:
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: "${{ inputs.os }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download msquic for Linux
        if: ${{ !startsWith(inputs.target, 'win-') }}
        shell: bash
        run: |
          curl -sSL "https://github.com/microsoft/msquic/releases/download/v2.4.10/msquic_linux_x64_Release_openssl3.zip" \
            -o /tmp/msquic-linux.zip
          mkdir -p /tmp/msquic-linux
          unzip -o /tmp/msquic-linux.zip -d /tmp/msquic-linux

      - name: "Build and Publish ${{ inputs.project_name }}"
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)

            release_name="TwitchDropsBot-${{ inputs.project_name }}-${{ inputs.target }}-$tag"

            # Build the project
            dotnet publish ${{ inputs.project_path }} \
              -f ${{ inputs.framework }} \
              -r ${{ inputs.target }} \
              -p:PublishSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -c Release \
              -o "$release_name"

      - name: Bundle msquic native libs (Linux)
        if: ${{ !startsWith(inputs.target, 'win-') }}
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{ inputs.target }}-$tag"

          # Bundle libmsquic.so from GitHub release
          so_file=$(ls /tmp/msquic-linux/bin/libmsquic.so.* 2>/dev/null | grep -v lttng | head -1)
          if [ -n "$so_file" ]; then
            cp "$so_file" "$release_name/libmsquic.so"
            echo "Copied $so_file -> $release_name/libmsquic.so"
          else
            echo "No libmsquic.so found in /tmp/msquic-linux/"
          fi

          # Bundle libxdp dependency (needed by msquic)
          sudo apt-get update -qq && sudo apt-get install -y -qq libxdp1 patchelf 2>/dev/null
          cp /usr/lib/x86_64-linux-gnu/libxdp* "$release_name/" 2>/dev/null || echo "No libxdp found"

          # Set RPATH=$ORIGIN on libmsquic.so so it finds libxdp.so in its own directory
          patchelf --set-rpath '$ORIGIN' "$release_name/libmsquic.so" 2>/dev/null || echo "patchelf failed"

      - name: Bundle msquic native libs (Windows)
        if: "${{ startsWith(inputs.target, 'win-') }}"
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{inputs.target }}-$tag"

          # Download msquic.dll from GitHub releases
          curl -sSL "https://github.com/microsoft/msquic/releases/download/v2.4.10/msquic_windows_x64_Release_schannel.zip" \
            -o /tmp/msquic-win.zip
          unzip -o /tmp/msquic-win.zip -d /tmp/msquic-win/
          cp /tmp/msquic-win/bin/msquic.dll "$release_name/" 2>/dev/null || echo "msquic.dll not found in zip"
          ls -la "$release_name/msquic.dll"

      - name: Package for Windows
        shell: bash
        if: "${{ startsWith(inputs.target, 'win-') }}"
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{inputs.target }}-$tag"

          # Package as zip
          7z a -tzip "${release_name}.zip" "./${release_name}/*"

          # Clean up
          rm -r "$release_name"

      - name: Package for Unix
        shell: bash
        if: "${{ !startsWith(inputs.target, 'win-') }}"
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{inputs.target }}-$tag"

          # Package as tar.gz
          tar czvf "${release_name}.tar.gz" "$release_name"

          # Clean up
          rm -r "$release_name"
          
      - name: Publish Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: "TwitchDropsBot-${{ inputs.project_name }}-*"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
